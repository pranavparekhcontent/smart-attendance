<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070E0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#1E90FF" flood-opacity="0.5"/>
    </filter>
    <filter id="capGlow">
      <feDropShadow dx="0" dy="4" stdDeviation="18" flood-color="#1E90FF" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="113" fill="url(#bg)"/>
  <!-- Inner highlight sheen -->
  <rect width="512" height="512" rx="113" fill="url(#sheen)"/>
  <!-- Border glow -->
  <rect width="508" height="508" x="2" y="2" rx="111" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.5"/>
  <rect width="502" height="502" x="5" y="5" rx="108" fill="none" stroke="rgba(30,144,255,0.12)" stroke-width="2"/>
  <!-- Graduation cap emoji with glow -->
  <text x="256" y="310" font-size="240" text-anchor="middle" font-family="'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',Arial" filter="url(#capGlow)">&#x1F393;</text>
  <!-- RMDIPER text with accent glow -->
  <text x="256" y="453" font-size="48" text-anchor="middle" font-family="Inter,Arial,sans-serif" fill="#1E90FF" font-weight="800" letter-spacing="5" filter="url(#textGlow)">RMDIPER</text>
</svg>