<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#111827;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0f1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E90FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0070E0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sheen" x1="0%" y1="0%" x2="50%" y2="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="textGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#1E90FF" flood-opacity="0.5"/>
    </filter>
    <filter id="capGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="8" flood-color="#1E90FF" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Inner highlight sheen -->
  <rect width="192" height="192" rx="42" fill="url(#sheen)"/>
  <!-- Border glow -->
  <rect width="190" height="190" x="1" y="1" rx="41" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
  <rect width="186" height="186" x="3" y="3" rx="39" fill="none" stroke="rgba(30,144,255,0.15)" stroke-width="1"/>
  <!-- Graduation cap emoji with glow -->
  <text x="96" y="116" font-size="88" text-anchor="middle" font-family="'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',Arial" filter="url(#capGlow)">&#x1F393;</text>
  <!-- RMDIPER text with accent glow -->
  <text x="96" y="170" font-size="18" text-anchor="middle" font-family="Inter,Arial,sans-serif" fill="#1E90FF" font-weight="800" letter-spacing="2" filter="url(#textGlow)">RMDIPER</text>
</svg>